services:
  - type: web
    name: beauty-salon-crm
    env: php
    region: frankfurt
    plan: free
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: beauty-salon-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: beauty-salon-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: beauty-salon-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: beauty-salon-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: beauty-salon-db
          property: password
      - key: REDIS_HOST
        fromService:
          type: redis
          name: beauty-salon-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: beauty-salon-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: beauty-salon-redis
          property: password
      - key: CACHE_STORE
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: FILESYSTEM_DISK
        value: local

  - type: redis
    name: beauty-salon-redis
    plan: free
    region: frankfurt

databases:
  - name: beauty-salon-db
    databaseName: beauty_salon
    user: beauty_salon_user
    plan: free
    region: frankfurt
